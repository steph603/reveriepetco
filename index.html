<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reverie Pet Co.</title>
  <meta name="description" content="Premium handmade pet accessories from a veterinary nurse in Melbourne, Australia." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       Design Tokens
       ============================================================ */
    :root {
      /* --- Palette --- */
      --color-wisteria:       #9b8eae;
      --color-pewter-silver:  #9ba8b0;
      --color-silvery-sage:   #8fa898;
      --color-moonstone:      #e8ebf0;
      --color-aged-parchment: #f4f1ec;
      --color-midnight-ink:   #2d2d35;

      /* --- Semantic colours --- */
      --color-bg:             var(--color-aged-parchment);
      --color-surface:        #ffffff;
      --color-text-primary:   var(--color-midnight-ink);
      --color-text-muted:     var(--color-pewter-silver);
      --color-accent:         var(--color-wisteria);
      --color-accent-dark:    #8a7c9d;
      --color-avatar-bg:      var(--color-moonstone);
      --color-divider:        var(--color-wisteria);

      /* --- Typography --- */
      --font-heading: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Raleway', system-ui, sans-serif;

      --font-size-name:    clamp(2rem, 6vw, 2.75rem);
      --font-size-tagline: clamp(0.75rem, 2vw, 0.85rem);
      --font-size-button:  0.8rem;
      --font-size-footer:  0.7rem;

      --font-weight-light:   300;
      --font-weight-regular: 400;
      --font-weight-medium:  500;

      --letter-spacing-wide:   0.08em;
      --letter-spacing-wider:  0.12em;
      --letter-spacing-tight:  0.03em;

      /* --- Spacing --- */
      --space-xs:  0.375rem;
      --space-sm:  0.625rem;
      --space-md:  1rem;
      --space-lg:  1.75rem;
      --space-xl:  2.75rem;

      /* --- Radii --- */
      --radius-full:   9999px;
      --radius-card:   1.25rem;
      --radius-button: 0.5rem;

      /* --- Shadows --- */
      --shadow-card:         0 4px 40px rgba(45, 45, 53, 0.07);
      --shadow-button-hover: 0 6px 20px rgba(155, 142, 174, 0.35);

      /* --- Transitions --- */
      --transition-base: 200ms ease;
    }

    /* ============================================================
       Reset
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ============================================================
       Base
       ============================================================ */
    html, body {
      min-height: 100%;
    }

    body {
      font-family: var(--font-body);
      font-weight: var(--font-weight-light);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-lg);
    }

    /* ============================================================
       Card
       ============================================================ */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-xl) var(--space-lg);
      max-width: 400px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-lg);
    }

    /* ============================================================
       Avatar
       ============================================================ */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: var(--radius-full);
      background-color: var(--color-avatar-bg);
      border: 2px solid var(--color-wisteria);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar__placeholder {
      font-family: var(--font-heading);
      font-size: 2.25rem;
      font-weight: var(--font-weight-light);
      font-style: italic;
      color: var(--color-wisteria);
      line-height: 1;
      user-select: none;
    }

    /* ============================================================
       Identity
       ============================================================ */
    .identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
    }

    .name {
      font-family: var(--font-heading);
      font-size: var(--font-size-name);
      font-weight: var(--font-weight-light);
      letter-spacing: var(--letter-spacing-tight);
      color: var(--color-midnight-ink);
      line-height: 1.1;
    }

    .tagline {
      font-family: var(--font-body);
      font-size: var(--font-size-tagline);
      font-weight: var(--font-weight-light);
      color: var(--color-text-muted);
      letter-spacing: var(--letter-spacing-wider);
      text-transform: uppercase;
      line-height: 1.6;
    }

    /* ============================================================
       Divider
       ============================================================ */
    .divider {
      width: 32px;
      height: 1px;
      background-color: var(--color-divider);
      opacity: 0.4;
    }

    /* ============================================================
       Links
       ============================================================ */
    .links {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      width: 100%;
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: 0.9rem var(--space-md);
      border-radius: var(--radius-button);
      background-color: var(--color-aged-parchment);
      border: 1px solid transparent;
      color: var(--color-midnight-ink);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: var(--font-size-button);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
      transition:
        background-color var(--transition-base),
        color           var(--transition-base),
        box-shadow      var(--transition-base),
        transform       var(--transition-base);
    }

    .link-button:hover {
      background-color: var(--color-wisteria);
      color: #ffffff;
      box-shadow: var(--shadow-button-hover);
      transform: translateY(-1px);
    }

    .link-button:focus-visible {
      outline: 2px solid var(--color-wisteria);
      outline-offset: 3px;
    }

    .link-button:active {
      transform: translateY(0);
    }

    .link-button svg {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }

    /* ============================================================
       Footer
       ============================================================ */
    .footer {
      font-size: var(--font-size-footer);
      color: var(--color-text-muted);
      letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card">

    <div class="avatar" aria-label="Reverie Pet Co. profile photo">
      <!--
        When you have a photo, replace the placeholder span with:
        <img src="avatar.jpg" alt="Reverie Pet Co." />
      -->
      <span class="avatar__placeholder" aria-hidden="true">R</span>
    </div>

    <div class="identity">
      <h1 class="name">Reverie Pet Co.</h1>
      <p class="tagline">
        Premium handmade pet accessories<br>
        Veterinary nurse &middot; Melbourne, AU
      </p>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <nav class="links" aria-label="Links">

      <a class="link-button"
         href="https://reveriepetco.etsy.com"
         target="_blank"
         rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.088 3.678C8.769 2.656 9.95 2 11.29 2h1.42c1.34 0 2.521.656 3.202 1.678l.42.632H8.088v-.632zM5 6.81V17.19C5 19.848 7.15 22 9.806 22h4.388C16.85 22 19 19.848 19 17.19V6.81H5zm5.25 9.44v-4.5h3.5v1.5h-2v.75h1.75v1.5H11.75v.75h2v1.5h-3.5v-1.5zm-2.5-4.5h1.5v4.5H7.75v-4.5z"/>
        </svg>
        Shop on Etsy
      </a>

      <a class="link-button"
         href="https://instagram.com/reveriepetco"
         target="_blank"
         rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
        Follow on Instagram
      </a>

    </nav>

    <footer class="footer">
      <p>Melbourne, Australia</p>
    </footer>

  </main>
</body>
</html>
