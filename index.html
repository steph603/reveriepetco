<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reverie Pet Co.</title>
  <meta name="description" content="Premium handmade pet accessories from a veterinary nurse in Melbourne, Australia." />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       Design Tokens
       ============================================================ */
    :root {
      /* --- Palette --- */
      --color-wisteria:       #9b8eae;
      --color-pewter-silver:  #9ba8b0;
      --color-silvery-sage:   #8fa898;
      --color-moonstone:      #e8ebf0;
      --color-aged-parchment: #f4f1ec;
      --color-midnight-ink:   #2d2d35;

      /* --- Semantic colours --- */
      --color-bg:             var(--color-aged-parchment);
      --color-surface:        #ffffff;
      --color-text-primary:   var(--color-midnight-ink);
      --color-text-muted:     var(--color-pewter-silver);
      --color-accent:         var(--color-wisteria);
      --color-accent-dark:    #8a7c9d;
      --color-avatar-bg:      var(--color-moonstone);
      --color-divider:        var(--color-wisteria);

      /* --- Typography --- */
      --font-heading: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Raleway', system-ui, sans-serif;

      --font-size-name:    clamp(3rem, 9vw, 4.25rem);
      --font-size-tagline: clamp(0.75rem, 2vw, 0.85rem);
      --font-size-button:  0.8rem;
      --font-size-footer:  0.7rem;

      --font-weight-light:   300;
      --font-weight-regular: 400;
      --font-weight-medium:  500;

      --letter-spacing-wide:   0.08em;
      --letter-spacing-wider:  0.12em;
      --letter-spacing-tight:  0.03em;

      /* --- Spacing --- */
      --space-xs:  0.375rem;
      --space-sm:  0.625rem;
      --space-md:  1rem;
      --space-lg:  1.75rem;
      --space-xl:  2.75rem;

      /* --- Radii --- */
      --radius-full:   9999px;
      --radius-card:   1.25rem;
      --radius-button: 0.5rem;

      /* --- Shadows --- */
      --shadow-card:         0 4px 40px rgba(45, 45, 53, 0.07);
      --shadow-button-hover: 0 6px 20px rgba(155, 142, 174, 0.35);

      /* --- Transitions --- */
      --transition-base: 200ms ease;
    }

    /* ============================================================
       Reset
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ============================================================
       Base
       ============================================================ */
    html, body {
      min-height: 100%;
    }

    body {
      font-family: var(--font-body),serif;
      font-weight: var(--font-weight-light);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-lg);
    }

    /* ============================================================
       Card
       ============================================================ */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--space-xl) var(--space-lg);
      max-width: 400px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-lg);
    }

    /* ============================================================
       Avatar
       ============================================================ */
    .avatar {
      width: clamp(115px, 31vw, 165px);
      height: clamp(115px, 31vw, 165px);
      border-radius: var(--radius-full);
      background-color: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      margin-bottom: calc(-1.5 * var(--space-lg));
    }

    .avatar img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      display: block;
    }

    /* ============================================================
       Identity
       ============================================================ */
    .identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
    }

    .name {
      font-family: var(--font-heading);
      font-size: var(--font-size-name);
      font-weight: var(--font-weight-light);
      letter-spacing: var(--letter-spacing-tight);
      color: var(--color-midnight-ink);
      line-height: 1.1;

      .subheader {
        display: block;
        font-family: var(--font-heading);
        font-size: clamp(0.95rem, 2.25vw, 1.1rem);
        font-weight: var(--font-weight-light);
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: var(--color-midnight-ink);
        margin-top: 0.2em;
      }
    }

    .tagline {
      font-family: var(--font-body);
      font-size: var(--font-size-tagline);
      font-weight: var(--font-weight-light);
      color: var(--color-text-muted);
      letter-spacing: var(--letter-spacing-wider);
      text-transform: uppercase;
      line-height: 1.6;
    }

    /* ============================================================
       Divider
       ============================================================ */
    .divider {
      width: 32px;
      height: 1px;
      background-color: var(--color-divider);
      opacity: 0.4;
    }

    /* ============================================================
       Links
       ============================================================ */
    .links {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      width: 100%;
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: 0.9rem var(--space-md);
      border-radius: var(--radius-button);
      background-color: var(--color-aged-parchment);
      border: 1px solid transparent;
      color: var(--color-midnight-ink);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: var(--font-size-button);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--letter-spacing-wide);
      /*text-transform: uppercase;*/
      transition:
        background-color var(--transition-base),
        color           var(--transition-base),
        box-shadow      var(--transition-base),
        transform       var(--transition-base);
    }

    .link-button:hover {
      background-color: var(--color-wisteria);
      color: #ffffff;
      box-shadow: var(--shadow-button-hover);
      transform: translateY(-1px);
    }

    .link-button:focus-visible {
      outline: 2px solid var(--color-wisteria);
      outline-offset: 3px;
    }

    .link-button:active {
      transform: translateY(0);
    }

    .link-button svg {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }

    /* ============================================================
       Newsletter
       ============================================================ */
    .newsletter {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
    }

    .newsletter__label {
      font-family: var(--font-body);
      font-size: var(--font-size-footer);
      font-weight: var(--font-weight-light);
      letter-spacing: var(--letter-spacing-wider);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .newsletter__row {
      display: flex;
      flex-wrap: wrap;
      width: 100%;
      gap: var(--space-xs);
    }

    .newsletter__input {
      flex: 1;
      min-width: 50%;
      padding: 0.75rem var(--space-sm);
      border: 1px solid var(--color-moonstone);
      border-radius: var(--radius-button);
      background-color: var(--color-aged-parchment);
      font-family: var(--font-body);
      font-size: var(--font-size-button);
      font-weight: var(--font-weight-light);
      color: var(--color-midnight-ink);
      outline: none;
      transition: border-color var(--transition-base);
    }

    .newsletter__submit {
      flex: 1;
      min-width: 50%;
      flex-shrink: 0;
      padding: 0.75rem var(--space-md);
      border: none;
      border-radius: var(--radius-button);
      background-color: var(--color-wisteria);
      color: #ffffff;
      font-family: var(--font-body);
      font-size: var(--font-size-button);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color var(--transition-base), box-shadow var(--transition-base);
      white-space: nowrap;
    }

    .newsletter__input::placeholder {
      color: var(--color-pewter-silver);
    }

    .newsletter__input:focus {
      border-color: var(--color-wisteria);
    }


    .newsletter__submit:hover {
      background-color: var(--color-accent-dark);
      box-shadow: var(--shadow-button-hover);
    }

    .newsletter__response {
      font-size: var(--font-size-footer);
      font-family: var(--font-body);
      font-weight: var(--font-weight-light);
      letter-spacing: var(--letter-spacing-wide);
      text-align: center;
    }

    #mce-error-response  { color: #b05a5a; }
    #mce-success-response { color: var(--color-silvery-sage); }

    /* ============================================================
       Footer
       ============================================================ */
    .footer {
      font-size: var(--font-size-footer);
      color: var(--color-text-muted);
      letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card">

    <div class="avatar" aria-label="Reverie Pet Co. profile photo">
      <img src="assets/logo.svg" alt="Reverie Pet Co. logo" />
    </div>

    <div class="identity">
      <h1 class="name">Reverie<span class="subheader">Pet Co.</span></h1>
      <p class="tagline">
        Premium pet accessories <br>handmade by a veterinary nurse<br>
      </p>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <nav class="links" aria-label="Links">

      <a class="link-button"
         href="https://reveriepetco.etsy.com"
         target="_blank"
         rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">

        </svg>
        Shop on Etsy
      </a>

      <a class="link-button"
         href="https://instagram.com/reveriepetco"
         target="_blank"
         rel="noopener noreferrer">

        </svg>
        Follow on Instagram
      </a>

    </nav>

    <form
      class="newsletter"
      action="https://reveriepetco.us22.list-manage.com/subscribe/post?u=8175842e77d196d6153afa523&amp;id=c41b971220&amp;f_id=008ac2e1f0"
      method="post"
      id="mc-embedded-subscribe-form"
      name="mc-embedded-subscribe-form"
      target="_blank"
      novalidate>

      <div class="newsletter__row">
        <input
          class="newsletter__input"
          type="email"
          name="EMAIL"
          id="mce-EMAIL"
          placeholder="your@email.com"
          required />
        <button class="newsletter__submit" type="submit" name="subscribe">Subscribe</button>
      </div>

      <!-- Honeypot — do not remove -->
      <div aria-hidden="true" style="position: absolute; left: -5000px;">
        <input type="text" name="b_8175842e77d196d6153afa523_c41b971220" tabindex="-1" value="" />
      </div>

      <div id="mce-error-response"   class="newsletter__response" style="display:none;"></div>
      <div id="mce-success-response" class="newsletter__response" style="display:none;"></div>

    </form>

    <footer class="footer">
      <p>Melbourne, Australia</p>
    </footer>

  </main>
</body>
</html>
